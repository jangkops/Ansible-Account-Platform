---
- name: 통합 사용자 프로비저닝
  hosts: localhost
  gather_facts: no
  vars:
    region: "us-east-1"
    identity_store_id: "d-90679e0e0f"
    researcher_permission_set_name: "Researcher"
    
  tasks:
    - name: Get SSO instance info
      amazon.aws.aws_ssoadmin_instance_info:
        region: "{{ region }}"
      register: sso_instances
      
    - name: Set instance ARN
      set_fact:
        instance_arn: "{{ sso_instances.instances[0].instance_arn }}"
    
    - name: Get permission sets
      amazon.aws.aws_ssoadmin_permission_set_info:
        instance_arn: "{{ instance_arn }}"
        region: "{{ region }}"
      register: permission_sets
      
    - name: Find Researcher permission set
      set_fact:
        researcher_permission_set_arn: "{{ item.permission_set_arn }}"
      loop: "{{ permission_sets.permission_sets }}"
      when: item.name == researcher_permission_set_name
      
    - name: Assign Researcher permission set to user
      amazon.aws.aws_ssoadmin_account_assignment:
        instance_arn: "{{ instance_arn }}"
        permission_set_arn: "{{ researcher_permission_set_arn }}"
        principal_id: "{{ user_id }}"
        principal_type: "USER"
        target_id: "{{ target_account_id }}"
        target_type: "AWS_ACCOUNT"
        region: "{{ region }}"
        state: present
      register: permission_result
      
    - name: Create server account via SSM
      shell: |
        python3 << 'PYEOF'
        import boto3, time, sys
        ssm = boto3.client('ssm', region_name='{{ region }}')
        username = '{{ username }}'
        project_group = '{{ project_group }}'
        instance_ids = {{ instance_ids | to_json }}
        commands = [
            'groupadd {} 2>/dev/null || true'.format(username),
            'groupadd {} 2>/dev/null || true'.format(project_group),
            'useradd -m -s /bin/bash -g {} -G {} {}'.format(username, project_group, username),
            'mkdir -p /home/{}/.ssh'.format(username),
            'chmod 700 /home/{}/.ssh'.format(username),
            'chown -R {}:{} /home/{}'.format(username, username, username),
        ]
        results = []
        for instance_id in instance_ids:
            response = ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript', Parameters={'commands': commands})
            command_id = response['Command']['CommandId']
            for _ in range(30):
                time.sleep(2)
                result = ssm.get_command_invocation(CommandId=command_id, InstanceId=instance_id)
                if result['Status'] in ['Success', 'Failed', 'Cancelled', 'TimedOut']:
                    break
            results.append({'instance_id': instance_id, 'status': result['Status']})
        print('Created user {} on {} instances'.format(username, len(results)))
        for r in results:
            print('  {}: {}'.format(r['instance_id'], r['status']))
        PYEOF
      register: server_result
      
    - name: Show results
      debug:
        msg:
          - "Permission Set Assigned: {{ researcher_permission_set_arn }}"
          - "Server Account Created: {{ server_result.stdout }}"
