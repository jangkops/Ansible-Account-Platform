schemaVersion: '0.3'
description: "Remove Linux user via Ansible + SSM Automation (multi-region support)"

parameters:
  username:
    type: String
    description: "삭제할 계정명"

  region:
    type: String
    description: "대상 EC2 리전"
    allowedValues:
      - us-east-1
      - us-west-2
      - ap-northeast-2
      - ap-northeast-1
      - eu-west-1

  instanceId:
    type: String
    description: "대상 EC2 인스턴스 ID"

mainSteps:
  - name: RemoveUserWithAnsible
    action: "aws:runCommand"
    timeoutSeconds: 1800
    onFailure: Abort
    inputs:
      DocumentName: "AWS-RunShellScript"
      InstanceIds:
        - "{{ instanceId }}"
      Parameters:
        commands:
          - |
            docker exec ansible-runner \
              ansible-playbook /home/app/ansible/regions/{{ region }}/playbooks/user_remove.yml \
              -e "username={{ username }} instance_id={{ instanceId }} aws_region={{ region }}"

